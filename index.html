<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tetris Final</title>

<style>
body{
 margin:0;
 background:#020617;
 color:#fff;
 font-family:Arial;
 overflow:hidden;
}

#top{
 display:flex;
 justify-content:space-between;
 padding:10px;
}

canvas{
 background:#000;
 border-radius:8px;
}

#controls{
 position:fixed;
 bottom:10px;
 left:50%;
 transform:translateX(-50%);
}

.btn{
 width:60px;height:60px;
 margin:5px;
 border:none;
 border-radius:50%;
 background:#22c55e;
 font-size:20px;
}

#overlay{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.8);
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 font-size:24px;
 display:none;
}
</style>
</head>

<body>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
 <button onclick="togglePause()">⏸</button>
 <button onclick="toggleSound()">🔊</button>
</div>

<canvas id="game" width="200" height="400"></canvas>

<div id="controls">
 <button class="btn" onclick="move(-1)">←</button>
 <button class="btn" onclick="rotatePiece()">⟳</button>
 <button class="btn" onclick="move(1)">→</button>
 <button class="btn" onclick="drop()">↓</button>
 <button class="btn" onclick="hardDrop()">⏬</button>
</div>

<div id="overlay">
 <div id="overText">GAME OVER</div>
 <button onclick="restart()">Restart</button>
</div>

<audio id="music" loop src="https://cdn.pixabay.com/download/audio/2022/03/15/audio.mp3"></audio>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.scale(20,20);

const arena=Array.from({length:20},()=>Array(10).fill(0));
const colors=[null,'red','yellow','orange','blue','cyan','green','purple'];
const pieces='TJLOSZI';

let player={pos:{x:0,y:0},matrix:null};
let score=0;
let best=localStorage.getItem("best")||0;
let paused=false;
let gameOver=false;
let sound=true;

function rand(){return createPiece(pieces[Math.random()*7|0]);}

function createPiece(t){
 switch(t){
  case 'T':return[[0,1,0],[1,1,1],[0,0,0]];
  case 'O':return[[2,2],[2,2]];
  case 'L':return[[0,3,0],[0,3,0],[0,3,3]];
  case 'J':return[[0,4,0],[0,4,0],[4,4,0]];
  case 'I':return[[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
  case 'S':return[[0,6,6],[6,6,0],[0,0,0]];
  case 'Z':return[[7,7,0],[0,7,7],[0,0,0]];
 }
}

function draw(){
 ctx.fillStyle="#000";
 ctx.fillRect(0,0,200,400);

 arena.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   ctx.fillStyle=colors[v];
   ctx.fillRect(x,y,1,1);
  }
 }));

 player.matrix.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   ctx.fillStyle=colors[v];
   ctx.fillRect(x+player.pos.x,y+player.pos.y,1,1);
  }
 }));
}

function collide(){
 for(let y=0;y<player.matrix.length;y++){
  for(let x=0;x<player.matrix[y].length;x++){
   if(player.matrix[y][x]&&(arena[y+player.pos.y]&&arena[y+player.pos.y][x+player.pos.x])!==0){
    return true;
   }
  }
 }
 return false;
}

function merge(){
 player.matrix.forEach((r,y)=>r.forEach((v,x)=>{
  if(v)arena[y+player.pos.y][x+player.pos.x]=v;
 }));
}

function sweep(){
 let rows=[];
 for(let y=0;y<arena.length;y++){
  if(arena[y].every(v=>v)){
   rows.push(y);
  }
 }

 rows.forEach(y=>{
  arena[y].fill(0);
 });

 setTimeout(()=>{
  rows.forEach(y=>{
   arena.splice(y,1);
   arena.unshift(new Array(10).fill(0));
   score+=10;
  });
 },100);
}

function reset(){
 player.matrix=rand();
 player.pos={x:3,y:0};

 if(collide()){
  gameOver=true;
  document.getElementById("overlay").style.display="flex";
  if(score>best){
   best=score;
   localStorage.setItem("best",best);
  }
 }
}

function updateUI(){
 document.getElementById("score").innerText=score;
 document.getElementById("best").innerText=best;
}

function drop(){
 if(paused||gameOver)return;
 player.pos.y++;
 if(collide()){
  player.pos.y--;
  merge();
  sweep();
  reset();
 }
}

function hardDrop(){
 while(!collide()){
  player.pos.y++;
 }
 player.pos.y--;
 drop();
}

function move(d){
 if(paused)return;
 player.pos.x+=d;
 if(collide())player.pos.x-=d;
}

function rotatePiece(){
 if(paused)return;
 const m=player.matrix;
 const r=m[0].map((_,i)=>m.map(r=>r[i])).reverse();
 const old=player.matrix;
 player.matrix=r;
 if(collide())player.matrix=old;
}

function togglePause(){
 paused=!paused;
}

function toggleSound(){
 sound=!sound;
 const music=document.getElementById("music");
 if(sound)music.play(); else music.pause();
}

function restart(){
 arena.forEach(r=>r.fill(0));
 score=0;
 gameOver=false;
 document.getElementById("overlay").style.display="none";
 reset();
}

let last=0,dropCounter=0,interval=700;

function update(t=0){
 const dt=t-last;
 last=t;
 if(!paused&&!gameOver){
  dropCounter+=dt;
  if(dropCounter>interval){
   drop();
   dropCounter=0;
  }
 }

 draw();
 updateUI();
 requestAnimationFrame(update);
}

document.addEventListener("keydown",e=>{
 if(e.keyCode===37)move(-1);
 if(e.keyCode===39)move(1);
 if(e.keyCode===40)drop();
 if(e.keyCode===38)rotatePiece();
 if(e.keyCode===32)hardDrop();
});

reset();
update();
</script>

</body>
</html>
