<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f2027;
 color:#fff;
 text-align:center;
}

#container{
 display:flex;
 justify-content:center;
 gap:15px;
 margin-top:10px;
}

canvas{
 background:#111;
 border-radius:10px;
}

#panel{
 text-align:left;
}

.box{
 background:#1e293b;
 padding:10px;
 margin-bottom:10px;
 border-radius:10px;
}

#controls{
 position:fixed;
 bottom:15px;
 left:50%;
 transform:translateX(-50%);
}

.btn{
 width:65px;
 height:65px;
 margin:5px;
 font-size:22px;
 border:none;
 border-radius:15px;
 background:#00f0ff;
 color:#000;
}

.btn:active{
 background:#00aabb;
}
</style>
</head>

<body>

<h2>🧱 Tetris</h2>

<div id="container">
 <canvas id="game" width="200" height="400"></canvas>

 <div id="panel">
  <div class="box">Score: <span id="score">0</span></div>
  <div class="box">Level: <span id="level">1</span></div>
  <div class="box">
   Next:
   <canvas id="next" width="80" height="80"></canvas>
  </div>
 </div>
</div>

<div id="controls">
 <div>
  <button class="btn" onclick="move(-1)">←</button>
  <button class="btn" onclick="move(1)">→</button>
 </div>
 <div>
  <button class="btn" onclick="rotatePiece()">⟳</button>
  <button class="btn" onclick="drop()">↓</button>
 </div>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.scale(20,20);

const nextCanvas=document.getElementById('next');
const nextCtx=nextCanvas.getContext('2d');
nextCtx.scale(20,20);

function createMatrix(w,h){
 const m=[];
 while(h--)m.push(new Array(w).fill(0));
 return m;
}

function createPiece(t){
 switch(t){
  case 'T':return[[0,1,0],[1,1,1],[0,0,0]];
  case 'O':return[[2,2],[2,2]];
  case 'L':return[[0,3,0],[0,3,0],[0,3,3]];
  case 'J':return[[0,4,0],[0,4,0],[4,4,0]];
  case 'I':return[[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
  case 'S':return[[0,6,6],[6,6,0],[0,0,0]];
  case 'Z':return[[7,7,0],[0,7,7],[0,0,0]];
 }
}

const colors=[null,'red','yellow','orange','blue','cyan','green','purple'];

function drawMatrix(m,o,context){
 m.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   context.fillStyle=colors[v];
   context.fillRect(x+o.x,y+o.y,1,1);
  }
 }));
}

function draw(){
 ctx.fillStyle='#000';
 ctx.fillRect(0,0,canvas.width,canvas.height);
 drawMatrix(arena,{x:0,y:0},ctx);
 drawMatrix(player.matrix,player.pos,ctx);
}

function drawNext(){
 nextCtx.fillStyle='#000';
 nextCtx.fillRect(0,0,nextCanvas.width,nextCanvas.height);
 drawMatrix(nextPiece,{x:1,y:1},nextCtx);
}

function collide(arena,p){
 const[m,o]=[p.matrix,p.pos];
 for(let y=0;y<m.length;y++){
  for(let x=0;x<m[y].length;x++){
   if(m[y][x]&&(arena[y+o.y]&&arena[y+o.y][x+o.x])!==0){
    return true;
   }
  }
 }
 return false;
}

function merge(arena,p){
 p.matrix.forEach((r,y)=>r.forEach((v,x)=>{
  if(v)arena[y+p.pos.y][x+p.pos.x]=v;
 }));
}

function rotate(m){
 for(let y=0;y<m.length;y++){
  for(let x=0;x<y;x++){
   [m[x][y],m[y][x]]=[m[y][x],m[x][y]];
  }
 }
 m.forEach(r=>r.reverse());
}

function sweep(){
 outer:for(let y=arena.length-1;y>=0;y--){
  for(let x=0;x<arena[y].length;x++){
   if(arena[y][x]===0)continue outer;
  }

  arena.splice(y,1);
  arena.unshift(new Array(10).fill(0));

  score+=10;

  if(score%100===0){
   level++;
   dropInterval*=0.9;
  }
 }
}

function playerReset(){
 player.matrix=nextPiece;
 nextPiece=createPiece(pieces[Math.random()*pieces.length|0]);

 player.pos.y=0;
 player.pos.x=(arena[0].length/2|0)-(player.matrix[0].length/2|0);

 if(collide(arena,player)){
  arena.forEach(row=>row.fill(0));
  score=0;
  level=1;
  dropInterval=1000;
 }
}

function drop(){
 player.pos.y++;
 if(collide(arena,player)){
  player.pos.y--;
  merge(arena,player);
  sweep();
  playerReset();
  updateUI();
 }
 dropCounter=0;
}

function move(dir){
 player.pos.x+=dir;
 if(collide(arena,player)){
  player.pos.x-=dir;
 }
}

function rotatePiece(){
 rotate(player.matrix);
 if(collide(arena,player)){
  rotate(player.matrix);
  rotate(player.matrix);
  rotate(player.matrix);
 }
}

function updateUI(){
 document.getElementById('score').innerText=score;
 document.getElementById('level').innerText=level;
}

let dropCounter=0;
let dropInterval=1000;
let lastTime=0;

function update(time=0){
 const dt=time-lastTime;
 lastTime=time;
 dropCounter+=dt;

 if(dropCounter>dropInterval){
  drop();
 }

 draw();
 drawNext();
 requestAnimationFrame(update);
}

document.addEventListener('keydown',e=>{
 if(e.keyCode===37)move(-1);
 else if(e.keyCode===39)move(1);
 else if(e.keyCode===40)drop();
 else if(e.keyCode===38)rotatePiece();
});

const arena=createMatrix(10,20);
const player={pos:{x:0,y:0},matrix:null};

const pieces='TJLOSZI';
let nextPiece=createPiece(pieces[Math.random()*pieces.length|0]);

let score=0;
let level=1;

playerReset();
updateUI();
update();
</script>

</body>
</html>
