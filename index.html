<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tetris Mobile</title>

<style>
html, body {
 margin:0;
 padding:0;
 height:100%;
 background:#020617;
 color:#fff;
 font-family:Arial;
 overflow:hidden;
}

#top{
 display:flex;
 justify-content:space-between;
 padding:10px 15px;
 font-size:16px;
}

#gameWrapper{
 width:100%;
 height:calc(100vh - 50px);
 display:flex;
 justify-content:center;
 align-items:center;
}

canvas{
 background:#000;
 border-radius:12px;
}
</style>
</head>

<body>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<div id="gameWrapper">
 <canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

function resize(){
 const ratio = 10/20;

 let w = window.innerWidth;
 let h = window.innerHeight - 60;

 let newW = h * ratio;
 let newH = h;

 if(newW > w){
  newW = w * 0.95;
  newH = newW / ratio;
 }

 canvas.style.width = newW + "px";
 canvas.style.height = newH + "px";

 canvas.width = 10;
 canvas.height = 20;

 ctx.setTransform(
  newW/10,0,
  0,newH/20,
  0,0
 );
}

window.addEventListener('resize',resize);
resize();

const arena=Array.from({length:20},()=>Array(10).fill(0));
const colors=[null,'red','yellow','orange','blue','cyan','green','purple'];
const pieces='TJLOSZI';

function createPiece(t){
 switch(t){
  case 'T':return[[0,1,0],[1,1,1],[0,0,0]];
  case 'O':return[[2,2],[2,2]];
  case 'L':return[[0,3,0],[0,3,0],[0,3,3]];
  case 'J':return[[0,4,0],[0,4,0],[4,4,0]];
  case 'I':return[[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
  case 'S':return[[0,6,6],[6,6,0],[0,0,0]];
  case 'Z':return[[7,7,0],[0,7,7],[0,0,0]];
 }
}

let player={pos:{x:0,y:0},matrix:null};
let score=0;
let best=localStorage.getItem("best")||0;

function drawMatrix(m,o){
 m.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   ctx.fillStyle=colors[v];
   ctx.fillRect(x+o.x,y+o.y,1,1);
  }
 }));
}

function draw(){
 ctx.fillStyle="#000";
 ctx.fillRect(0,0,10,20);

 drawMatrix(arena,{x:0,y:0});
 drawMatrix(player.matrix,player.pos);
}

function collide(){
 for(let y=0;y<player.matrix.length;y++){
  for(let x=0;x<player.matrix[y].length;x++){
   if(player.matrix[y][x]&&(arena[y+player.pos.y]&&arena[y+player.pos.y][x+player.pos.x])!==0){
    return true;
   }
  }
 }
 return false;
}

function merge(){
 player.matrix.forEach((r,y)=>r.forEach((v,x)=>{
  if(v)arena[y+player.pos.y][x+player.pos.x]=v;
 }));
}

function sweep(){
 for(let y=arena.length-1;y>=0;y--){
  if(arena[y].every(v=>v)){
   arena.splice(y,1);
   arena.unshift(new Array(10).fill(0));
   score+=10;
  }
 }
}

function reset(){
 player.matrix=createPiece(pieces[Math.random()*7|0]);
 player.pos={x:3,y:0};

 if(collide()){
  arena.forEach(r=>r.fill(0));

  if(score>best){
   best=score;
   localStorage.setItem("best",best);
  }

  score=0;
 }
}

function updateUI(){
 document.getElementById("score").innerText=score;
 document.getElementById("best").innerText=best;
}

function drop(){
 player.pos.y++;
 if(collide()){
  player.pos.y--;
  merge();
  sweep();
  reset();
 }
}

function move(d){
 player.pos.x+=d;
 if(collide())player.pos.x-=d;
}

function rotatePiece(){
 const m=player.matrix;
 const r=m[0].map((_,i)=>m.map(r=>r[i])).reverse();
 const old=player.matrix;
 player.matrix=r;
 if(collide())player.matrix=old;
}

/* TOUCH CONTROL */
let startX=0,startY=0;

canvas.addEventListener("touchstart",e=>{
 startX=e.touches[0].clientX;
 startY=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
 let dx=e.changedTouches[0].clientX-startX;
 let dy=e.changedTouches[0].clientY-startY;

 if(Math.abs(dx)<10 && Math.abs(dy)<10){
  rotatePiece(); // TAP
  return;
 }

 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>20)move(1);
  else if(dx<-20)move(-1);
 }else{
  if(dy>20)drop();
 }
});

/* LOOP */
let last=0,dropCounter=0,interval=700;

function update(t=0){
 const dt=t-last;
 last=t;
 dropCounter+=dt;

 if(dropCounter>interval){
  drop();
  dropCounter=0;
 }

 draw();
 updateUI();
 requestAnimationFrame(update);
}

reset();
update();
</script>

</body>
</html>
