<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tetris</title>
<style>
body{margin:0;font-family:Arial;background:#0f2027;color:#fff;text-align:center}
canvas{background:#111;display:block;margin:auto}
#controls{
 position:fixed;
 bottom:10px;
 left:50%;
 transform:translateX(-50%);
}
.btn{
 width:60px;height:60px;margin:5px;
 font-size:20px;
 border:none;border-radius:10px;
 background:#00f0ff;color:#000;
}
</style>
</head>
<body>

<h2>Tetris 🎮</h2>
<canvas id="game" width="200" height="400"></canvas>

<div id="controls">
 <button class="btn" onclick="move(-1)">←</button>
 <button class="btn" onclick="rotatePiece()">⟳</button>
 <button class="btn" onclick="move(1)">→</button>
 <button class="btn" onclick="drop()">↓</button>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.scale(20,20);

function createMatrix(w,h){const m=[];while(h--)m.push(new Array(w).fill(0));return m;}
function createPiece(t){
 switch(t){
  case 'T':return[[0,1,0],[1,1,1],[0,0,0]];
  case 'O':return[[2,2],[2,2]];
  case 'L':return[[0,3,0],[0,3,0],[0,3,3]];
  case 'J':return[[0,4,0],[0,4,0],[4,4,0]];
  case 'I':return[[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
  case 'S':return[[0,6,6],[6,6,0],[0,0,0]];
  case 'Z':return[[7,7,0],[0,7,7],[0,0,0]];
 }
}

const colors=[null,'red','yellow','orange','blue','cyan','green','purple'];

function drawMatrix(m,o){
 m.forEach((r,y)=>r.forEach((v,x)=>{
  if(v){
   ctx.fillStyle=colors[v];
   ctx.fillRect(x+o.x,y+o.y,1,1);
  }
 }));
}

function draw(){
 ctx.fillStyle='#000';
 ctx.fillRect(0,0,canvas.width,canvas.height);
 drawMatrix(arena,{x:0,y:0});
 drawMatrix(player.matrix,player.pos);
}

function collide(arena,p){
 const[m,o]=[p.matrix,p.pos];
 for(let y=0;y<m.length;y++){
  for(let x=0;x<m[y].length;x++){
   if(m[y][x]&&(arena[y+o.y]&&arena[y+o.y][x+o.x])!==0){
    return true;
   }
  }
 }
 return false;
}

function merge(arena,p){
 p.matrix.forEach((r,y)=>r.forEach((v,x)=>{
  if(v)arena[y+p.pos.y][x+p.pos.x]=v;
 }));
}

function rotate(m){
 for(let y=0;y<m.length;y++){
  for(let x=0;x<y;x++){
   [m[x][y],m[y][x]]=[m[y][x],m[x][y]];
  }
 }
 m.forEach(r=>r.reverse());
}

function playerReset(){
 const pieces='TJLOSZI';
 player.matrix=createPiece(pieces[Math.random()*pieces.length|0]);
 player.pos.y=0;
 player.pos.x=(arena[0].length/2|0)-(player.matrix[0].length/2|0);
}

function drop(){
 player.pos.y++;
 if(collide(arena,player)){
  player.pos.y--;
  merge(arena,player);
  playerReset();
 }
 dropCounter=0;
}

function move(dir){
 player.pos.x+=dir;
 if(collide(arena,player)){
  player.pos.x-=dir;
 }
}

function rotatePiece(){
 rotate(player.matrix);
}

let dropCounter=0;
let dropInterval=1000;
let lastTime=0;

function update(time=0){
 const dt=time-lastTime;
 lastTime=time;
 dropCounter+=dt;

 if(dropCounter>dropInterval){
  drop();
 }

 draw();
 requestAnimationFrame(update);
}

document.addEventListener('keydown',e=>{
 if(e.keyCode===37)move(-1);
 else if(e.keyCode===39)move(1);
 else if(e.keyCode===40)drop();
 else if(e.keyCode===38)rotatePiece();
});

const arena=createMatrix(10,20);
const player={pos:{x:0,y:0},matrix:null};

playerReset();
update();
</script>

</body>
</html>
